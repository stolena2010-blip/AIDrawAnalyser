site_name: AIDrawAnalyser
site_description: AI-powered analysis of engineering PDF drawings
site_url: https://stolena2010-blip.github.io/AIDrawAnalyser/

repo_url: https://github.com/stolena2010-blip/AIDrawAnalyser
repo_name: stolena2010-blip/AIDrawAnalyser

theme:
  name: material
  language: he
  direction: rtl
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation: deployment.md
      - Project Overview: overview.md
  - Sale Readiness:
      - Recommendations: sale-readiness.md
      - Technical Due Diligence: technical-due-diligence.md
      - Security: security.md
      - Data Handling: data-handling.md
      - License Review: license-review.md
  - UX:
      - Recommendations: ux-recommendations.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  # - mkdocstrings:    # Auto-docs from Python docstrings — uncomment when ready
  #     handlers:
  #       python:
  #         paths: [.]
  #         options:
  #           show_source: true
  #           show_root_heading: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stolena2010-blip/AIDrawAnalyser
