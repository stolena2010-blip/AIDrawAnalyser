[pytest]
# שורש הפרויקט ב-sys.path — מאפשר `from core.X import Y` בקבצי בדיקה.
# בלי זה, Linux CI נכשל ב-collection עם ModuleNotFoundError למרות
# ש-Windows עובד (בגלל הבדל בהתנהגות pytest --import-mode בין הפלטפורמות).
pythonpath = .

# ברירת מחדל: traceback מלא ב-CI כדי שכשלים יהיו ברורים
addopts = -v --tb=long
